eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      default-zone: http://localhost:8761/eureka
    instance:
      hostname: localhost

microservice:
  payment-service:
    endpoints:
      endpoints:
        uri: http://PAYMENT-SERVICE/payment/doPayment
  order-service:
    endpoints:
      endpoints:
        uri: http://ORDER-SERVICE/order/bookorder
